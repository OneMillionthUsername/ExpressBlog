name: Deploy to Production
on:
  workflow_run:
    workflows: ["CI - Lint & Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /var/www/blog
            
            # 1. SSH-Key explizit für Git-Operationen definieren
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/deployment_key_git -o StrictHostKeyChecking=no"
            
            # 2. Code-Update vom Repository
            echo "Updating code from GitHub..."
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Berechtigungen korrigieren (UMASK 027 Kompensation)
            chmod -R o+r /var/www/blog
            find /var/www/blog -type d -exec chmod o+x {} \;
            
            # 4. Umgebungsvariablen für Docker setzen
            export NODE_ENV=production
            export DOCKER_TARGET=release

            # 5. Container-Stack neu bauen und starten
            echo "Starting Docker build and compose..."
            docker compose up -d --build

            # 6. Health-Check mit kleiner Verzögerung
            echo "Waiting for container to stabilize..."
            sleep 5
            
            if [ "$(docker ps -q -f name=expressblog_app)" ]; then
              echo "✅ Deployment erfolgreich: Container expressblog_app läuft."
            else
              echo "❌ Fehler: Container konnte nicht gestartet werden."
              echo "--- Letzte Log-Einträge ---"
              docker logs expressblog_app --tail 20
              exit 1
            fi