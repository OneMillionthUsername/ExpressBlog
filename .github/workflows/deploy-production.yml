name: Deploy to Production
on:
  workflow_run:
    workflows: ["CI - Lint & Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy-production
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v5.2.0
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /var/www/speculumx/blog
            
            # 1. SSH-Key explizit für Git-Operationen definieren
            export GIT_SSH_COMMAND="ssh -i ~/.ssh/deployment_key_git -o StrictHostKeyChecking=no"
            
            # 2. Code-Update vom Repository
            echo "Updating code from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            # 3. Berechtigungen für Nginx korrigieren (UMASK 027 Kompensation)
            # Nur public/ muss für www-data lesbar sein (statische Assets)
            find /var/www/speculumx/blog/public -type f -exec chmod o+r {} \;
            find /var/www/speculumx/blog/public -type d -exec chmod o+x {} \;

            # 4. Umgebungsvariablen für Docker setzen
            export NODE_ENV=production
            export DOCKER_TARGET=release

            # 5. Container-Stack neu bauen und starten
            echo "Starting Docker build and compose..."
            docker compose --env-file .env.production up -d --build

            # 6. Health-Check mit kleiner Verzögerung
            echo "Waiting for container to stabilize..."
            sleep 5
            
            if [ "$(docker ps -q -f name=speculumx_app)" ]; then
              echo "Container läuft – prüfe Applikations-Health..."
            else
              echo "❌ Fehler: Container konnte nicht gestartet werden."
              echo "--- Letzte Log-Einträge ---"
              docker logs speculumx_app --tail 20
              exit 1
            fi

            # 7. Echten App-Health prüfen (nicht nur Container-Status)
            for i in {1..20}; do
              if curl -fsS "http://127.0.0.1:3000/health" > /dev/null; then
                echo "✅ Deployment erfolgreich: /health antwortet."
                exit 0
              fi
              echo "Health-Check Versuch $i/20 fehlgeschlagen – warte 2s..."
              sleep 2
            done

            echo "❌ Fehler: Container läuft, aber /health ist nicht erreichbar."
            echo "--- Container-Status ---"
            docker ps --filter name=speculumx_app
            echo "--- Letzte Log-Einträge ---"
            docker logs speculumx_app --tail 50
            exit 1