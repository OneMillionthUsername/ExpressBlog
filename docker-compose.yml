# In der Produktion läuft Nginx direkt auf dem Host, um besseres Monitoring, Logging
services:
  app:
    image: nullhasvalue/expressblog:latest
    # Container-Prozess läuft mit dediziertem Docker-User (UID 119)
    # und Gruppe 34 (www-data), damit Dateirechte zu nginx/www-data passen.
    ports:
      - "127.0.0.1:3000:3000" # Erreichbar für Host-Nginx (Prod) & Docker-Nginx (Dev)
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-release}
    container_name: speculumx_app
    restart: always
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
    env_file:
      - ".env.${NODE_ENV:-development}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      # Produktionsmodus: Code kommt aus dem Image (kein Host-Bind-Mount)
      # Dadurch bleibt das readonly-RootFS kompatibel und reproduzierbar.
      # Den Upload-Ordner explizit beschreibbar machen, für Bilder und Logs.
      - ./public/assets/media:/app/public/assets/media:rw
      - ./logs:/app/logs:rw
      - /var/log/nginx/blog-access.log:/var/log/nginx/blog-access.log:ro
      - /etc/goaccess/goaccess.conf:/etc/goaccess/goaccess.conf:ro
      # 4. Temporärer Speicher für den Upload-Vorgang (Buffer)
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 64m
    networks:
      speculumx_net:
        aliases:
          - app
    extra_hosts:
      - "host.docker.internal:host-gateway" # Damit die App den Host erreichen kann (z.B. für Nginx in der Produktion)
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mariadb:latest
    user: "mysql" # Default user, damit ein Angreifer nicht mit root-Rechten im Container agieren kann
    container_name: speculumx_db
    restart: always
    env_file:
      - ".env.${NODE_ENV:-development}"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD} 
      - MARIADB_DATABASE=${DB_NAME}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    command: --innodb-buffer-pool-size=64M --innodb-log-file-size=16M
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      speculumx_net:
        aliases:
          - db
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:

networks:
  speculumx_net:
    driver: bridge