# Gemischte Entwicklungs- und Produktionsumgebung: Nginx läuft in einem separaten Container für die Entwicklung, aber direkt auf dem Host für die Produktion.
# In der Produktion läuft Nginx direkt auf dem Host, um besseres Monitoring, Logging
services:
  # Produktion: Nginx wird nicht mehr in Docker ausgeführt,
  # sondern direkt auf dem Host, wegen besseremn Monitoring, Logging und fail2ban.
  # nginx:
  #   image: nginx:latest
  #   container_name: expressblog_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #     # Damit Nginx die Assets des Blogs direkt ausliefern kann
  #     - .:/app:ro 
  #     # Damit das Portfolio erreichbar ist
  #     - /var/www/portfolio:/var/www/portfolio:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - expressblog_net

  app:
    image: nullhasvalue/expressblog:latest
    # User ändern, weil UMASK den Docker internen user zu wenige Rechte vergibt
    # damit wird der Container mit dem Host User ausgeführt, damit die Dateien auch auf dem Host die richtigen Rechte haben
    user: "118:120"
    ports:
      - "127.0.0.1:3000:3000" # Erreichbar für Host-Nginx (Prod) & Docker-Nginx (Dev)
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-release}
    container_name: expressblog_app
    restart: always
    # expose:
    #   - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
    env_file:
      - ".env.${NODE_ENV:-development}"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      expressblog_net:
        aliases:
          - app
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mariadb:latest
    container_name: expressblog_db
    restart: always
    env_file:
      - ".env.${NODE_ENV:-development}"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD} 
      - MARIADB_DATABASE=${DB_NAME}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      expressblog_net:
        aliases:
          - db
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:

networks:
  expressblog_net:
    driver: bridge