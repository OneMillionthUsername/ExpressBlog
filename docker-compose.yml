# Gemischte Entwicklungs- und Produktionsumgebung: Nginx läuft in einem separaten Container für die Entwicklung, aber direkt auf dem Host für die Produktion.
# In der Produktion läuft Nginx direkt auf dem Host, um besseres Monitoring, Logging
#
# TODO PRODUKTION: Container wurden von "expressblog_*" auf "speculumx_*" umbenannt.
# Auf dem Produktionsserver folgende Schritte ausführen:
#   1. docker compose down  (stoppt expressblog_app, expressblog_db)
#   2. git pull             (zieht diese docker-compose.yml)
#   3. docker compose --env-file .env.production up -d
# Die DB-Daten bleiben im Volume erhalten (kein --volumes flag verwenden!).
# Das Volume heißt danach speculumx_db_data statt expressblog_db_data —
# falls das alte Volume weiter genutzt werden soll, vorher manuell migrieren:
#   docker run --rm -v expressblog_db_data:/from -v speculumx_db_data:/to alpine sh -c "cp -a /from/. /to/"
services:
  # Produktion: Nginx wird nicht mehr in Docker ausgeführt,
  # sondern direkt auf dem Host, wegen besseremn Monitoring, Logging und fail2ban.
  # nginx:
  #   image: nginx:latest
  #   container_name: speculumx_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #     # Damit Nginx die Assets des Blogs direkt ausliefern kann
  #     - .:/app:ro
  #     # Damit das Portfolio erreichbar ist
  #     - /var/www/portfolio:/var/www/portfolio:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - speculumx_net

  app:
    image: nullhasvalue/expressblog:latest
    # Container-Prozess läuft mit dediziertem Docker-User (UID 119)
    # und Gruppe 34 (www-data), damit Dateirechte zu nginx/www-data passen.
    ports:
      - "127.0.0.1:3000:3000" # Erreichbar für Host-Nginx (Prod) & Docker-Nginx (Dev)
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-release}
    container_name: speculumx_app
    restart: always
    # expose:
    #   - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
    env_file:
      - ".env.${NODE_ENV:-development}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      # Produktionsmodus: Code kommt aus dem Image (kein Host-Bind-Mount)
      # Dadurch bleibt das readonly-RootFS kompatibel und reproduzierbar.
      # 2. Den Upload-Ordner explizit beschreibbar machen
      - ./public/assets/media:/app/public/assets/media:rw
      - ./logs:/app/logs:rw
      # 4. Temporärer Speicher für den Upload-Vorgang (Buffer)
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 64m
    networks:
      speculumx_net:
        aliases:
          - app
    extra_hosts:
      - "host.docker.internal:host-gateway" # Damit die App den Host erreichen kann (z.B. für Nginx in der Produktion)
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mariadb:latest
    user: "mysql" # Default user, damit ein Angreifer nicht mit root-Rechten im Container agieren kann
    container_name: speculumx_db
    restart: always
    env_file:
      - ".env.${NODE_ENV:-development}"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD} 
      - MARIADB_DATABASE=${DB_NAME}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_AUTO_UPGRADE=1
    command: --innodb-buffer-pool-size=64M --innodb-log-file-size=16M
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      speculumx_net:
        aliases:
          - db
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:

networks:
  speculumx_net:
    driver: bridge