services:
  nginx:
    image: nginx:alpine
    container_name: expressblog_nginx
    networks:
      - expressblog_net
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    image: nullhasvalue/expressblog:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-dev}
    container_name: expressblog_app
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
    env_file:
      - .env.${NODE_ENV:-development}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      expressblog_net:
        aliases:
          - app
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mariadb:11
    container_name: expressblog_db
    restart: always
    env_file:
      - .env.${NODE_ENV:-development}
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      expressblog_net:
        aliases:
          - db
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:

networks:
  expressblog_net:
    driver: bridge