services:
  app:
    image: nullhasvalue/expressblog:latest
    build:
      context: .
      dockerfile: Dockerfile
      # Standardmäßig 'dev', auf dem Server per CI/CD auf 'release' setzen
      target: ${DOCKER_TARGET:-dev}
    container_name: expressblog_app
    restart: always
    # Interner Port-Zugriff (Nginx fungiert als Gateway)
    expose:
      - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
    env_file:
      - .env.${NODE_ENV:-development}
    # Volumes sind lokal Gold wert (Hot-Reload), in Prod werden sie durch das Image ersetzt
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - expressblog_net
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mariadb:11
    container_name: expressblog_db
    restart: always
    env_file:
      - .env.${NODE_ENV:-development}
    # Sicherheit: Port 3306 ist NICHT mehr nach außen gemappt
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - expressblog_net
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:

networks:
  expressblog_net:
    driver: bridge