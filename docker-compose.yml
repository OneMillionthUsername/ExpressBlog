# Gemischte Entwicklungs- und Produktionsumgebung: Nginx läuft in einem separaten Container für die Entwicklung, aber direkt auf dem Host für die Produktion.
# In der Produktion läuft Nginx direkt auf dem Host, um besseres Monitoring, Logging
services:
  # Produktion: Nginx wird nicht mehr in Docker ausgeführt,
  # sondern direkt auf dem Host, wegen besseremn Monitoring, Logging und fail2ban.
  # nginx:
  #   image: nginx:latest
  #   container_name: expressblog_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #     # Damit Nginx die Assets des Blogs direkt ausliefern kann
  #     - .:/app:ro 
  #     # Damit das Portfolio erreichbar ist
  #     - /var/www/portfolio:/var/www/portfolio:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - expressblog_net

  app:
    image: nullhasvalue/expressblog:latest
    # Container-Prozess läuft mit dediziertem Docker-User (UID 119)
    # und Gruppe 34 (www-data), damit Dateirechte zu nginx/www-data passen.
    ports:
      - "127.0.0.1:3000:3000" # Erreichbar für Host-Nginx (Prod) & Docker-Nginx (Dev)
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-release}
    container_name: expressblog_app
    restart: always
    # expose:
    #   - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
    env_file:
      - ".env.${NODE_ENV:-development}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      # Produktionsmodus: Code kommt aus dem Image (kein Host-Bind-Mount)
      # Dadurch bleibt das readonly-RootFS kompatibel und reproduzierbar.
      # 2. Den Upload-Ordner explizit beschreibbar machen
      - ./public/assets/media:/app/public/assets/media:rw
      - ./logs:/app/logs:rw
      # 4. Temporärer Speicher für den Upload-Vorgang (Buffer)
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 64m
    networks:
      expressblog_net:
        aliases:
          - app
    extra_hosts:
      - "host.docker.internal:172.18.0.1"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: mariadb:latest
    user: "mysql" # Default user, damit ein Angreifer nicht mit root-Rechten im Container agieren kann
    container_name: expressblog_db
    restart: always
    env_file:
      - ".env.${NODE_ENV:-development}"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD} 
      - MARIADB_DATABASE=${DB_NAME}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      expressblog_net:
        aliases:
          - db
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:

networks:
  expressblog_net:
    driver: bridge